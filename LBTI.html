    </div>

</div>

// 核心逻辑
function start(t){ test=t; idx=0; score={A:0,B:0,C:0,D:0}; show('test-page'); render() }
function render(){
  const d=data[test]; const q=d.q[idx];
  $('prog').innerText=`${idx+1}/${d.q.length}`;
  $('qtext').innerText=q.q;
  $('opts').innerHTML=''; sel=null; $('nxt').disabled=true;
  q.o.forEach(o=>{
    const b=document.createElement('button');
    b.className='option'; b.innerText=o.c;
    b.onclick=()=>{
      document.querySelectorAll('.option').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected'); sel=o.t; $('nxt').disabled=false;
    }
    $('opts').appendChild(b);
  })
}
$('nxt').onclick=()=>{ score[sel]++; idx++; const d=data[test]; idx>=d.q.length?result():render() }
function result(){
  const d=data[test];
  let max='A';
  if(score.B>score[max])max='B';
  if(score.C>score[max])max='C';
  if(score.D>score[max])max='D';
  const r=d.res[max];
  $('rtag').innerText=max+'型';
  $('rtitle').innerText=r.name;
  $('rdesc').innerText=r.desc;
  show('res-page');
}
function restart(){ start(test) }
function copyResult(){
  const text = `${$('rtitle').innerText}\n${$('rdesc').innerText}\n#人格测试 #癫疯测试`;
  navigator.clipboard.writeText(text);
  $('copyTips').style.display='block';
  setTimeout(()=>$('copyTips').style.display='none',1500);
}
function showShare(){ alert('分享链接：你部署后的网址\n复制后发给朋友即可！') }
